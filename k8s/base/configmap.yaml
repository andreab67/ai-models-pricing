apiVersion: v1
kind: ConfigMap
metadata:
  name: model-pricing-config
data:
  ENVIRONMENT: prod
  LOG_LEVEL: INFO
  CORS_ORIGINS: '["https://models.andrea-house.com"]'
  REDIS_URL: redis://redis.redis.svc.cluster.local:6379/0
  OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
  OPENROUTER_REFRESH_SECONDS: "300"
  CACHE_TTL_SECONDS: "300"
  SMTP_HOST: smtp.andrea-house.com
  SMTP_PORT: "587"
  SMTP_STARTTLS: "true"
  SMTP_FROM: pricing-bot@andrea-house.com
  SMTP_TO: '["andreab@greenyogainc.com"]'
