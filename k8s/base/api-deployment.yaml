apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      initContainers:
        - name: migrate
          image: ghcr.io/andreab67/ai-models-pricing/api:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef: { name: model-pricing-config }
            - secretRef:    { name: model-pricing-secrets }
            - secretRef:    { name: ses-creds }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      containers:
        - name: api
          image: ghcr.io/andreab67/ai-models-pricing/api:latest
          imagePullPolicy: Always
          ports:
            - { containerPort: 8000, name: http }
          envFrom:
            - configMapRef: { name: model-pricing-config }
            - secretRef:    { name: model-pricing-secrets }
            - secretRef:    { name: ses-creds }
          resources:
            requests: { cpu: 100m, memory: 192Mi }
            limits:   { cpu: 1,    memory: 512Mi }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api
spec:
  minAvailable: 0
  selector:
    matchLabels: { app: api }
