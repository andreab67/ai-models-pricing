<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Spokes: drawn first so hexagon white fill masks the inner section -->
  <g stroke="#1a72e8" stroke-width="2.8" stroke-linecap="round">
    <line x1="37" y1="35" x2="37" y2="5"/>
    <line x1="37" y1="35" x2="64" y2="20"/>
    <line x1="37" y1="35" x2="64" y2="50"/>
    <line x1="37" y1="35" x2="45" y2="64"/>
    <line x1="37" y1="35" x2="10" y2="50"/>
    <line x1="37" y1="35" x2="10" y2="20"/>
  </g>
  <!-- Outer nodes -->
  <g fill="#1a72e8">
    <circle cx="37" cy="5"  r="4"/>
    <circle cx="64" cy="20" r="4"/>
    <circle cx="64" cy="50" r="4"/>
    <circle cx="45" cy="64" r="4"/>
    <circle cx="10" cy="50" r="4"/>
    <circle cx="10" cy="20" r="4"/>
  </g>
  <!-- Hexagon outline (white fill masks spokes inside) -->
  <polygon points="37,18 51,26 51,44 37,52 23,44 23,26"
           fill="white" stroke="#1a72e8" stroke-width="2.5"/>
  <!-- Isometric cube -->
  <polygon points="37,22 49,29 37,36 25,29" fill="#63aeff"/>
  <polygon points="37,36 49,29 49,43 37,50" fill="#1a72e8"/>
  <polygon points="37,36 25,29 25,43 37,50" fill="#3588f5"/>

  <!-- Green price tag -->
  <rect x="51" y="53" width="43" height="41" rx="8" fill="#16a34a"/>
  <!-- Hole -->
  <circle cx="62" cy="64" r="3.5" fill="white"/>
  <!-- Bar chart: 3 ascending bars -->
  <rect x="57" y="78" width="7" height="10" rx="1.5" fill="white"/>
  <rect x="66" y="72" width="7" height="16" rx="1.5" fill="white"/>
  <rect x="75" y="66" width="7" height="22" rx="1.5" fill="white"/>
</svg>
