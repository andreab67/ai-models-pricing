stages:
  - lint
  - build
  - test

variables:
  DOCKER_DRIVER: overlay2
  REGISTRY: ${CI_REGISTRY}
  IMAGE_API: ${REGISTRY}/${CI_PROJECT_PATH}/api
  IMAGE_WEB: ${REGISTRY}/${CI_PROJECT_PATH}/web

# Security note: Starlette >=0.49.1 includes fix for CVE-2025-54121 (file rollover blocking)
# See: https://nvd.nist.gov/vuln/detail/CVE-2025-54121

# Lint & typecheck frontend
lint:web:
  stage: lint
  image: node:22-alpine
  script:
    - cd web
    - npm install --frozen-lockfile
    - npm run lint
    - npm run typecheck
  cache:
    paths:
      - web/node_modules/
  only:
    - merge_requests
    - main

# Build and push API image
build:api:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  script:
    - docker build -t ${IMAGE_API}:${CI_COMMIT_SHORT_SHA} -t ${IMAGE_API}:latest api/
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        echo "Building for main branch. To push, configure CI_REGISTRY_USER and CI_REGISTRY_PASSWORD in CI/CD variables."
        echo "Then uncomment the docker login and push commands below."
        # docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${REGISTRY}
        # docker push ${IMAGE_API}:${CI_COMMIT_SHORT_SHA}
        # docker push ${IMAGE_API}:latest
      fi
  only:
    - merge_requests
    - main

# Build and push Web image
build:web:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  script:
    - docker build -t ${IMAGE_WEB}:${CI_COMMIT_SHORT_SHA} -t ${IMAGE_WEB}:latest web/
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        echo "Building for main branch. To push, configure CI_REGISTRY_USER and CI_REGISTRY_PASSWORD in CI/CD variables."
        echo "Then uncomment the docker login and push commands below."
        # docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${REGISTRY}
        # docker push ${IMAGE_WEB}:${CI_COMMIT_SHORT_SHA}
        # docker push ${IMAGE_WEB}:latest
      fi
  only:
    - merge_requests
    - main

# Test database schema with alembic (validates FastAPI + Starlette compatibility)
test:db-migrations:
  stage: test
  image: python:3.14-slim
  script:
    - cd api
    - pip install --no-cache-dir -e ".[dev]"
    # Verify Starlette is properly installed (respects pyproject.toml constraints)
    - python -c "import starlette; print(f'Starlette {starlette.__version__} installed')"
    - alembic upgrade head --sql
    - echo "✅ Database schema migrations validated"
  only:
    - merge_requests
    - main
